name: Backup Operations

on:
  schedule:
    # Daily at 01:30 UTC, which maps to early morning in Europe/Madrid.
    - cron: '30 1 * * *'
  workflow_dispatch:

env:
  CI: 'true'

jobs:
  backup:
    name: Backup Sheets and R2
    runs-on: ubuntu-latest

    env:
      GOOGLE_CREDENTIALS_BASE64: ${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run Sheets backup
        working-directory: backend
        run: npm run backup:sheets

      - name: Run R2 backup
        working-directory: backend
        run: npm run backup:r2
